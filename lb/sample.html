<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dlicom — Leaderboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/[email protected]/dist/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(ellipse at top, #0a0d2e 0%, #050617 50%, #030410 100%);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    color: #e0e7ff;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 20px;
  }
  .page { width: 100%; max-width: 860px; }
  .card {
    background: rgba(7, 8, 28, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid #1a1d3a;
    border-radius: 20px;
    padding: 28px 32px;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 600px 200px at 20% 0%, rgba(74,214,255,0.08), transparent 70%),
      radial-gradient(ellipse 500px 200px at 80% 100%, rgba(181,102,255,0.06), transparent 70%);
    pointer-events: none;
  }
  .card > * { position: relative; }

  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 24px;
  }
  .logo-mini { font-size: 10px; color: #5a608a; letter-spacing: 4px; }
  .title { font-size: 26px; font-weight: 500; color: #4ad6ff; letter-spacing: 3px; margin-top: 4px; line-height: 1; }
  .live { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #5a608a; padding-bottom: 4px; }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; position: relative; flex-shrink: 0; }
  .pulse-dot::after {
    content: ''; position: absolute; inset: -3px; border-radius: 50%; background: #4ade80;
    animation: pulse-ring 2s ease-out infinite;
  }
  @keyframes pulse-ring {
    0% { transform: scale(0.8); opacity: 0.6; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  /* CONSTELLATION */
  .constellation-wrap { margin: 20px -8px 8px; padding: 16px 8px 24px; position: relative; }
  .constellation-label { font-size: 10px; color: #5a608a; letter-spacing: 3px; text-align: center; margin-bottom: 8px; }
  .constellation { position: relative; height: 320px; overflow: visible; }
  .constellation-bg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .conn-line {
    fill: none; stroke-width: 1; stroke-dasharray: 3 4;
    animation: flow-line 12s linear infinite;
  }
  @keyframes flow-line { to { stroke-dashoffset: -28; } }
  .star { fill: #ffffff; animation: twinkle 3s ease-in-out infinite; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.85; }
  }

  .champion-pos { position: absolute; transform: translateX(-50%); }
  .champ-1-pos { top: 10px; left: 50%; }
  .champ-2-pos { top: 160px; left: 22%; }
  .champ-3-pos { top: 160px; left: 78%; }

  .champion {
    display: flex; flex-direction: column; align-items: center;
    animation: float 5s ease-in-out infinite;
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
  }
  .champ-1-pos .champion { animation-duration: 4.8s; animation-delay: 0s; }
  .champ-2-pos .champion { animation-duration: 5.3s; animation-delay: -1.7s; }
  .champ-3-pos .champion { animation-duration: 5.1s; animation-delay: -3.2s; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
  }
  .champion.swap-out {
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 0.25s, transform 0.25s;
  }

  .champ-avatar-wrap { position: relative; margin-bottom: 16px; }
  .champ-orbit-ring {
    position: absolute; inset: -10px; border-radius: 50%;
    border: 1px dashed; opacity: 0.5;
    animation: rotate-ring 22s linear infinite;
  }
  .champ-1-pos .champ-orbit-ring { animation-duration: 18s; }
  .champ-3-pos .champ-orbit-ring { animation-direction: reverse; }
  @keyframes rotate-ring { to { transform: rotate(360deg); } }

  .champ-orbit-ring-2 {
    position: absolute; inset: -20px; border-radius: 50%;
    border: 1px solid; opacity: 0.15;
    animation: rotate-ring 35s linear infinite reverse;
  }
  .champ-glow {
    position: absolute; inset: -28px; border-radius: 50%;
    animation: pulse-halo 3.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse-halo {
    0%, 100% { transform: scale(1); opacity: 0.35; }
    50% { transform: scale(1.2); opacity: 0.65; }
  }

  .champ-avatar {
    position: relative; z-index: 2;
    width: 68px; height: 68px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 500; color: #07081c;
    border: 2px solid;
  }
  .champ-1-pos .champ-avatar { width: 92px; height: 92px; font-size: 24px; border-width: 3px; }

  .champ-rank-pill {
    position: absolute; bottom: -6px; left: 50%;
    transform: translateX(-50%); z-index: 3;
    background: #07081c; border: 1px solid;
    padding: 2px 10px; border-radius: 10px;
    font-size: 10px; font-weight: 500; letter-spacing: 1px;
  }

  .champ-info { display: flex; flex-direction: column; align-items: center; gap: 2px; text-align: center; }
  .champ-name { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 500; color: #e0e7ff; }
  .champ-1-pos .champ-name { font-size: 14px; }
  .champ-handle { font-size: 11px; color: #5a608a; }
  .champ-score {
    font-size: 18px; font-weight: 500; color: #4ad6ff;
    margin-top: 6px; font-variant-numeric: tabular-nums;
  }
  .champ-1-pos .champ-score { font-size: 24px; }
  .champ-score.flash { animation: score-flash 0.8s ease-out; }
  @keyframes score-flash {
    0% { color: #ffffff; text-shadow: 0 0 18px rgba(74,214,255,0.9); }
    100% { color: #4ad6ff; text-shadow: none; }
  }
  .champ-tier { font-size: 9px; padding: 2px 7px; border-radius: 5px; letter-spacing: 1px; font-weight: 500; margin-top: 4px; }
  .tier-S { background: rgba(245,184,10,0.12); color: #f5b80a; border: 1px solid rgba(245,184,10,0.3); }
  .tier-A { background: rgba(181,102,255,0.12); color: #b566ff; border: 1px solid rgba(181,102,255,0.3); }
  .tier-B { background: rgba(74,144,226,0.12); color: #4a90e2; border: 1px solid rgba(74,144,226,0.3); }
  .tier-L { background: rgba(255,215,100,0.15); color: #ffd764; border: 1px solid rgba(255,215,100,0.4); }
  .verified { font-size: 13px; color: #4ad6ff; }

  .crown-icon {
    position: absolute; top: -28px; left: 50%;
    color: #f5b80a; z-index: 4;
    animation: crown-bob 3.2s ease-in-out infinite;
    filter: drop-shadow(0 0 8px rgba(245,184,10,0.6));
  }
  @keyframes crown-bob {
    0%, 100% { transform: translateX(-50%) translateY(0) rotate(-6deg); }
    50% { transform: translateX(-50%) translateY(-4px) rotate(6deg); }
  }

  .rank-1-color .champ-orbit-ring,
  .rank-1-color .champ-orbit-ring-2 { border-color: #f5b80a; }
  .rank-1-color .champ-glow { background: radial-gradient(circle, rgba(245,184,10,0.5), transparent 65%); }
  .rank-1-color .champ-avatar { border-color: #f5b80a; box-shadow: 0 0 20px rgba(245,184,10,0.4); }
  .rank-1-color .champ-rank-pill { border-color: #f5b80a; color: #f5b80a; }

  .rank-2-color .champ-orbit-ring,
  .rank-2-color .champ-orbit-ring-2 { border-color: #c4c8d0; }
  .rank-2-color .champ-glow { background: radial-gradient(circle, rgba(196,200,208,0.35), transparent 65%); }
  .rank-2-color .champ-avatar { border-color: #c4c8d0; box-shadow: 0 0 14px rgba(196,200,208,0.3); }
  .rank-2-color .champ-rank-pill { border-color: #c4c8d0; color: #c4c8d0; }

  .rank-3-color .champ-orbit-ring,
  .rank-3-color .champ-orbit-ring-2 { border-color: #cd7f32; }
  .rank-3-color .champ-glow { background: radial-gradient(circle, rgba(205,127,50,0.35), transparent 65%); }
  .rank-3-color .champ-avatar { border-color: #cd7f32; box-shadow: 0 0 14px rgba(205,127,50,0.3); }
  .rank-3-color .champ-rank-pill { border-color: #cd7f32; color: #cd7f32; }

  /* FILTERS */
  .filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .filter-label { font-size: 10px; color: #5a608a; letter-spacing: 2px; width: 60px; flex-shrink: 0; }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    background: transparent; border: 1px solid #1f2240;
    color: #8a90b0; padding: 7px 14px; border-radius: 9px;
    font-size: 12px; cursor: pointer; transition: all 0.2s ease;
    font-family: inherit;
  }
  .filter-btn:hover { border-color: #3a4070; color: #c0c5e0; }
  .filter-btn.active {
    background: rgba(74,214,255,0.1);
    border-color: #4ad6ff; color: #4ad6ff;
    box-shadow: 0 0 16px rgba(74,214,255,0.25);
  }
  .filter-btn .ti { vertical-align: -1px; }

  /* TABLE */
  .col-header {
    display: grid;
    grid-template-columns: 52px 1fr 140px 200px;
    gap: 14px; padding: 18px 16px 10px;
    font-size: 10px; color: #5a608a; letter-spacing: 2px;
    border-bottom: 1px solid #14172a; margin-top: 20px;
  }
  #rows { display: flex; flex-direction: column; }
  .lb-row {
    display: grid;
    grid-template-columns: 52px 1fr 140px 200px;
    gap: 14px; padding: 14px 16px; align-items: center;
    border-bottom: 1px solid #14172a;
    transition: background 0.2s ease;
    position: relative; will-change: transform;
  }
  .lb-row:hover { background: rgba(74,214,255,0.03); }
  .lb-row:last-child { border-bottom: none; }
  .lb-row.entering {
    opacity: 0; transform: translateY(20px);
    animation: row-enter 0.55s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
  }
  @keyframes row-enter { to { opacity: 1; transform: translateY(0); } }

  .lb-row.rank-1 { background: linear-gradient(90deg, rgba(245,184,10,0.05), transparent 60%); }
  .lb-row.rank-1::before, .lb-row.rank-2::before, .lb-row.rank-3::before {
    content: ''; position: absolute;
    left: 0; top: 10px; bottom: 10px;
    width: 3px; border-radius: 0 2px 2px 0;
  }
  .lb-row.rank-1::before { background: linear-gradient(180deg, #f5b80a, #ffd764); box-shadow: 0 0 14px rgba(245,184,10,0.5); }
  .lb-row.rank-2::before { background: #c4c8d0; }
  .lb-row.rank-3::before { background: #cd7f32; }

  .rank-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1; }
  .rank-num { font-size: 15px; color: #5a608a; font-weight: 500; font-variant-numeric: tabular-nums; }
  .rank-cell.r1 .rank-num { color: #f5b80a; font-size: 17px; }
  .rank-cell.r2 .rank-num { color: #c4c8d0; font-size: 17px; }
  .rank-cell.r3 .rank-num { color: #cd7f32; font-size: 17px; }
  .delta {
    font-size: 10px; margin-top: 4px;
    font-variant-numeric: tabular-nums;
    opacity: 0; transform: translateY(-2px);
    transition: opacity 0.4s, transform 0.4s;
  }
  .delta.visible { opacity: 1; transform: translateY(0); }
  .delta.up { color: #4ade80; }
  .delta.down { color: #ef4444; }

  .user-cell { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; color: #0a0a1a;
    flex-shrink: 0; transition: box-shadow 0.4s;
  }
  .avatar.ring-1 { box-shadow: 0 0 0 2px #f5b80a, 0 0 16px rgba(245,184,10,0.4); }
  .avatar.ring-2 { box-shadow: 0 0 0 2px #c4c8d0; }
  .avatar.ring-3 { box-shadow: 0 0 0 2px #cd7f32; }

  .user-info { min-width: 0; flex: 1; }
  .user-name { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #e0e7ff; font-weight: 500; }
  .user-handle { font-size: 11px; color: #5a608a; margin-top: 2px; }
  .tier { font-size: 9px; padding: 2px 7px; border-radius: 5px; letter-spacing: 1px; font-weight: 500; }

  .score-cell { text-align: right; }
  .score-num {
    font-size: 17px; color: #4ad6ff; font-weight: 500;
    font-variant-numeric: tabular-nums; line-height: 1.2;
  }
  .score-num.flash { animation: score-flash 0.8s ease-out; }
  .score-pct { font-size: 10px; color: #5a608a; margin-top: 3px; }

  .breakdown { text-align: right; font-size: 12px; color: #8a90b0; }
  .breakdown-item { display: inline-flex; align-items: center; gap: 5px; margin-left: 12px; }
  .breakdown-item:first-child { margin-left: 0; }
  .breakdown-item .ti { font-size: 13px; opacity: 0.7; }

  .footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 18px; padding-top: 18px;
    border-top: 1px solid #14172a;
    font-size: 11px; color: #5a608a;
  }

  @media (max-width: 720px) {
    .card { padding: 20px; }
    .constellation { height: auto; padding: 20px 0; display: flex; justify-content: space-around; align-items: flex-start; }
    .constellation-bg { display: none; }
    .champion-pos { position: static; transform: none; }
    .champ-1-pos, .champ-2-pos, .champ-3-pos { top: auto; left: auto; }
    .champion { animation: none; }
    .champ-1-pos .champ-avatar { width: 60px; height: 60px; font-size: 16px; }
    .champ-1-pos .champ-score { font-size: 18px; }
    .crown-icon { display: none; }
    .col-header, .lb-row { grid-template-columns: 36px 1fr 90px; gap: 10px; }
    .breakdown { display: none; }
    .filter-label { display: none; }
  }
</style>
</head>

  { name:"sage", handle:"@sage_dev", verified:true, tier:"B", initials:"SA", color:"#534ab7",

    week:{msgs:48, dcPts:48, posts:1, views:680, likes:12, xPts:62}},
];

let timeFilter = 'all';
let statFilter = 'all';
let firstRender = true;
let previousRanks = new Map();
const champState = { 1: null, 2: null, 3: null };

function fmt(n) { return n >= 1000 ? (n/1000).toFixed(1).replace('.0','') + 'k' : n.toLocaleString(); }

function computeScored() {
  return users.map(u => {
    const s = u[timeFilter];
    let score;
    if (statFilter === 'all') score = s.dcPts + s.xPts;
    else if (statFilter === 'discord') score = s.dcPts;
    else score = s.xPts;
    return { ...u, score, s };
  }).sort((a, b) => b.score - a.score);
}

function getBreakdown(u) {
  if (statFilter === 'all') {
    return `<span class="breakdown-item"><i class="ti ti-brand-discord" style="color:#5865f2"></i>${fmt(u.s.dcPts)}</span>
            <span class="breakdown-item"><i class="ti ti-brand-x"></i>${fmt(u.s.xPts)}</span>`;
  } else if (statFilter === 'discord') {
    return `<span class="breakdown-item"><i class="ti ti-message"></i>${fmt(u.s.msgs)} msgs</span>`;
  } else {
    return `<span class="breakdown-item"><i class="ti ti-eye"></i>${fmt(u.s.views)}</span>
            <span class="breakdown-item"><i class="ti ti-heart"></i>${fmt(u.s.likes)}</span>`;
  }
}

function tweenNumber(el, from, to, duration = 700) {
  const start = performance.now();
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(from + (to - from) * eased).toLocaleString();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function updateConnectionLines() {
  const cont = document.querySelector('.constellation');
  const champs = [
    document.querySelector('.champ-1-pos .champ-avatar'),
    document.querySelector('.champ-2-pos .champ-avatar'),
    document.querySelector('.champ-3-pos .champ-avatar'),
  ];
  if (!cont || !champs[0]) return;
  const cRect = cont.getBoundingClientRect();
  if (cRect.width === 0) return;
  const points = champs.map(el => {
    const r = el.getBoundingClientRect();
    return {
      x: (r.left + r.width/2 - cRect.left) * (800 / cRect.width),
      y: (r.top + r.height/2 - cRect.top) * (320 / cRect.height),
    };
  });
  const offset = (p1, p2, dist) => {
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len === 0) return p1;
    return { x: p1.x + (dx/len)*dist, y: p1.y + (dy/len)*dist };
  };
  const setLine = (id, a, b) => {
    const start = offset(a, b, 42);
    const end = offset(b, a, 42);
    document.getElementById(id).setAttribute('d', `M ${start.x} ${start.y} L ${end.x} ${end.y}`);
  };
  setLine('line-1-2', points[0], points[1]);
  setLine('line-1-3', points[0], points[2]);
  setLine('line-2-3', points[1], points[2]);
}

function renderChampions(scored) {
  for (let i = 0; i < 3; i++) {
    const slot = i + 1;
    const u = scored[i];
    const champEl = document.querySelector(`.champ-${slot}-pos .champion`);
    const prevHandle = champState[slot];

    const avatarEl = document.querySelector(`[data-slot="${slot}"]`);
    const nameEl = document.querySelector(`[data-slot="${slot}-name"]`);
    const handleEl = document.querySelector(`[data-slot="${slot}-handle"]`);
    const scoreEl = document.querySelector(`[data-slot="${slot}-score"]`);
    const tierEl = document.querySelector(`[data-slot="${slot}-tier"]`);

    const applyContent = () => {
      avatarEl.style.background = u.color;
      avatarEl.textContent = u.initials;
      nameEl.innerHTML = `${u.name}${u.verified ? '<i class="ti ti-rosette-discount-check-filled verified"></i>' : ''}`;
      handleEl.textContent = u.handle;
      tierEl.className = `champ-tier tier-${u.tier}`;
      tierEl.textContent = u.tier === 'L' ? 'LEGENDARY' : 'TIER ' + u.tier;
    };

    if (firstRender || prevHandle === null) {
      applyContent();
      scoreEl.textContent = u.score.toLocaleString();
      scoreEl.dataset.score = u.score;
    } else if (prevHandle !== u.handle) {
      champEl.classList.add('swap-out');
      setTimeout(() => {
        applyContent();
        const oldScore = parseInt(scoreEl.dataset.score) || 0;
        tweenNumber(scoreEl, oldScore, u.score);
        scoreEl.classList.remove('flash');
        void scoreEl.offsetWidth;
        scoreEl.classList.add('flash');
        scoreEl.dataset.score = u.score;
        champEl.classList.remove('swap-out');
      }, 280);
    } else {
      const oldScore = parseInt(scoreEl.dataset.score) || 0;
      if (oldScore !== u.score) {
        tweenNumber(scoreEl, oldScore, u.score);
        scoreEl.classList.remove('flash');
        void scoreEl.offsetWidth;
        scoreEl.classList.add('flash');
      }
      scoreEl.dataset.score = u.score;
    }
    champState[slot] = u.handle;
  }
  setTimeout(updateConnectionLines, 50);
}

function buildRow(u, rank, pct) {
  const row = document.createElement('div');
  row.className = 'lb-row';
  if (rank <= 3) row.classList.add(`rank-${rank}`);
  row.dataset.userId = u.handle;
  row.innerHTML = `
    <div class="rank-cell ${rank <= 3 ? 'r' + rank : ''}">
      <div class="rank-num">${rank}</div>
      <div class="delta"></div>
    </div>
    <div class="user-cell">
      <div class="avatar ${rank <= 3 ? 'ring-' + rank : ''}" style="background: ${u.color}">${u.initials}</div>
      <div class="user-info">
        <div class="user-name">
          ${u.name}
          ${u.verified ? '<i class="ti ti-rosette-discount-check-filled verified"></i>' : ''}
          <span class="tier tier-${u.tier}">${u.tier === 'L' ? 'LGND' : 'TIER ' + u.tier}</span>
        </div>
        <div class="user-handle">${u.handle}</div>
      </div>
    </div>
    <div class="score-cell">
      <div class="score-num" data-score="${u.score}">${u.score.toLocaleString()}</div>
      <div class="score-pct">${pct}% of pool</div>
    </div>
    <div class="breakdown">${getBreakdown(u)}</div>
  `;
  return row;
}

function showDelta(rowEl, change) {
  const deltaEl = rowEl.querySelector('.delta');
  if (!deltaEl) return;
  if (change === 0 || isNaN(change)) {
    deltaEl.className = 'delta';
    deltaEl.textContent = '';
    return;
  }
  deltaEl.textContent = change < 0 ? `↑${Math.abs(change)}` : `↓${change}`;
  deltaEl.className = `delta visible ${change < 0 ? 'up' : 'down'}`;
  clearTimeout(deltaEl._timer);
  deltaEl._timer = setTimeout(() => deltaEl.classList.remove('visible'), 2800);
}

function render() {
  const container = document.getElementById('rows');
  const scored = computeScored();
  const totalPool = scored.reduce((a, b) => a + b.score, 0);

  document.getElementById('score-label').textContent =
    statFilter === 'discord' ? 'DC PTS' :
    statFilter === 'twitter' ? 'X PTS' : 'SOCIAL SCORE';

  renderChampions(scored);

  if (firstRender) {
    scored.forEach((u, i) => {
      const pct = totalPool > 0 ? ((u.score / totalPool) * 100).toFixed(1) : '0';
      const row = buildRow(u, i + 1, pct);
      row.classList.add('entering');
      row.style.animationDelay = `${i * 70}ms`;
      container.appendChild(row);
      previousRanks.set(u.handle, i + 1);
    });
    firstRender = false;
    return;
  }

  const existing = Array.from(container.children);
  const rowsById = new Map(existing.map(r => [r.dataset.userId, r]));
  const firstRects = new Map();
  existing.forEach(el => firstRects.set(el, el.getBoundingClientRect()));

  const newRanks = new Map();
  scored.forEach((u, i) => {
    const rank = i + 1;
    newRanks.set(u.handle, rank);
    const pct = totalPool > 0 ? ((u.score / totalPool) * 100).toFixed(1) : '0';
    let row = rowsById.get(u.handle);
    if (!row) {
      row = buildRow(u, rank, pct);
      container.appendChild(row);
      return;
    }
    row.className = 'lb-row';
    if (rank <= 3) row.classList.add(`rank-${rank}`);
    const rankCellEl = row.querySelector('.rank-cell');
    rankCellEl.className = `rank-cell ${rank <= 3 ? 'r' + rank : ''}`;
    rankCellEl.querySelector('.rank-num').textContent = rank;
    row.querySelector('.avatar').className = `avatar ${rank <= 3 ? 'ring-' + rank : ''}`;

    const scoreEl = row.querySelector('.score-num');
    const oldScore = parseInt(scoreEl.dataset.score) || 0;
    if (oldScore !== u.score) {
      tweenNumber(scoreEl, oldScore, u.score);
      scoreEl.classList.remove('flash');
      void scoreEl.offsetWidth;
      scoreEl.classList.add('flash');
    }
    scoreEl.dataset.score = u.score;
    row.querySelector('.score-pct').textContent = `${pct}% of pool`;
    row.querySelector('.breakdown').innerHTML = getBreakdown(u);

    const oldRank = previousRanks.get(u.handle);
    if (oldRank !== undefined && oldRank !== rank) showDelta(row, rank - oldRank);

    container.appendChild(row);
  });

  existing.forEach(el => {
    const newRect = el.getBoundingClientRect();
    const firstRect = firstRects.get(el);
    if (!firstRect) return;
    const dy = firstRect.top - newRect.top;
    if (Math.abs(dy) < 1) return;
    el.animate(
      [{ transform: `translateY(${dy}px)` }, { transform: 'translateY(0)' }],
      { duration: 650, easing: 'cubic-bezier(0.34, 1.15, 0.5, 1)' }
    );
  });

  previousRanks = newRanks;
}

document.querySelectorAll('#time-filter .filter-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#time-filter .filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    timeFilter = b.dataset.time;
    render();
  });
});
document.querySelectorAll('#stat-filter .filter-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#stat-filter .filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    statFilter = b.dataset.stat;
    render();
  });
});

render();
window.addEventListener('resize', updateConnectionLines);
</script>
